<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Luxury Footwear Studio</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            /* PROFESSIONAL LUXURY STUDIO BG: Premium Deep Slate Blue to Dark Charcoal Vignette */
            background: radial-gradient(circle at center, #232d36 0%, #131a20 60%, #080b0e 100%);
            overflow: hidden;
            color: #dcb375; /* Elegant Champagne Gold for text detailing */
        }

        /* Subtle Ambient Studio Light Reflection overlay */
        .studio-shimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
        }

        /* 3D Model Viewer - Optimized for Realistic Shadows and High Resolution Leather Textures */
        model-viewer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            --poster-color: transparent;
            will-change: transform;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
        }

        /* UI Interface Overlay Container */
        .studio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            padding: 40px;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Elegant Minimalist Framing */
        .studio-frame {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 1px solid rgba(220, 179, 117, 0.05);
            pointer-events: none;
        }

        /* Left Editorial Sidebar Group */
        .left-panel-wrapper {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
        }

        /* Premium Matte Dark Slate Glassmorphism */
        .product-card {
            background: rgba(19, 26, 32, 0.85);
            border-left: 2px solid #dcb375;
            padding: 30px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(220, 179, 117, 0.08);
            border-bottom: 1px solid rgba(220, 179, 117, 0.08);
            border-right: 1px solid rgba(220, 179, 117, 0.08);
        }

        .studio-meta {
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(220, 179, 117, 0.4);
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-row {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 9px;
            color: rgba(220, 179, 117, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .detail-value {
            font-size: 19px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 4px;
            min-height: 24px;
            letter-spacing: -0.2px;
        }

        .price-tag {
            color: #dcb375 !important;
            font-family: Garamond, Baskerville, "Baskerville Old Face", "Hoefler Text", "Times New Roman", serif;
            font-size: 22px;
            font-style: italic;
        }

        .sizes-flex {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .size-btn {
            border: 1px solid rgba(220, 179, 117, 0.2);
            padding: 6px 14px;
            font-size: 11px;
            color: #dcb375;
            background: rgba(220, 179, 117, 0.02);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
        }
        
        .size-btn.reveal {
            opacity: 1;
        }

        .size-btn:hover, .size-btn.selected {
            border-color: #dcb375;
            color: #131a20;
            background: #dcb375;
            box-shadow: 0 10px 20px rgba(220, 179, 117, 0.15);
            font-weight: 600;
        }

        /* Subtle Floating Heritage Badge */
        .heritage-badge {
            font-size: 9px;
            letter-spacing: 2.5px;
            color: #131a20;
            background: #dcb375;
            padding: 14px 20px;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-weight: 600;
        }

        .heritage-badge.active {
            opacity: 1;
            transform: translateY(0);
            animation: elegantFloat 3s infinite alternate ease-in-out;
        }

        /* Right Bottom Camera Control Widget */
        .right-bottom-wrapper {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .camera-rotation-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(19, 26, 32, 0.7);
            padding: 14px;
            border: 1px solid rgba(220, 179, 117, 0.1);
            backdrop-filter: blur(15px);
        }

        .pad-title {
            font-size: 8px;
            color: rgba(220, 179, 117, 0.4);
            margin-bottom: 4px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .pad-row {
            display: flex;
            gap: 8px;
        }

        .rotate-trigger {
            width: 40px;
            height: 40px;
            background: rgba(19, 26, 32, 0.5);
            border: 1px solid rgba(220, 179, 117, 0.2);
            color: #dcb375;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rotate-trigger:hover {
            background: #dcb375;
            color: #131a20;
            border-color: #dcb375;
        }

        .collection-label {
            font-size: 10px;
            color: #dcb375;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(220, 179, 117, 0.2);
            padding-bottom: 6px;
            font-weight: 500;
        }

        /* Premium AR Presentation Trigger */
        .ar-trigger-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(19, 26, 32, 0.4);
            color: #dcb375;
            border: 1px solid #dcb375;
            padding: 14px 32px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(-15px);
            transition: opacity 0.8s ease, transform 0.8s ease, background 0.3s, color 0.3s;
        }

        .ar-trigger-btn:hover {
            background: #dcb375;
            color: #131a20;
            box-shadow: 0 15px 35px rgba(220, 179, 117, 0.25);
        }

        /* Professional Studio Material Loader Overlay */
        .studio-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
            background: #131a20;
            color: #dcb375;
            padding: 18px 36px;
            border: 1px solid rgba(220, 179, 117, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            font-weight: 500;
            transition: opacity 0.6s ease;
        }

        @keyframes elegantFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        /* Tailored Mobile Responsive Layout Overrides */
        @media (max-width: 768px) {
            .studio-overlay { padding: 20px; }
            .left-panel-wrapper {
                top: 25px; left: 20px; right: 20px;
                width: auto; gap: 12px;
            }
            .product-card {
                padding: 20px;
                background: rgba(19, 26, 32, 0.95);
            }
            .detail-row { margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
            .detail-label { font-size: 8px; min-width: 70px; }
            .detail-value { font-size: 16px; margin-top: 0; }
            .price-tag { font-size: 18px; }
            .sizes-flex { margin-top: 0; gap: 6px; }
            .size-btn { padding: 4px 10px; font-size: 10px; }
            .studio-meta { margin-bottom: 12px; font-size: 8px; }
            .heritage-badge { font-size: 9px; padding: 12px; }
            
            .right-bottom-wrapper { display: none !important; }

            .ar-trigger-btn {
                position: fixed;
                top: auto; bottom: 30px; right: 20px; left: 20px;
                width: calc(100% - 40px); text-align: center; padding: 16px 0;
                font-size: 11px; z-index: 10;
                background: #dcb375; color: #131a20;
            }
            model-viewer { height: 50%; top: 30%; }
            .studio-loader { font-size: 10px; padding: 14px 22px; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="studio-shimmer"></div>
    <div class="studio-frame"></div>

    <div class="studio-loader" id="studioLoader">Optimizing Studio Lighting...</div>

    <model-viewer 
        id="luxuryShoeViewer"
        src="Shoe.glb" 
        alt="Bespoke Tan Leather Brogues 3D Asset" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        interaction-prompt="none"
        shadow-intensity="2"
        shadow-softness="0.15"
        exposure="1.3"
        environment-image="neutral"
        powerPreference="high-performance">
        <button slot="ar-button" id="hiddenArBtn" style="display:none;"></button>
    </model-viewer>

    <div class="studio-overlay">
        
        <button class="ar-trigger-btn interactive" id="arBtn" onclick="triggerAR()">
            View In Room (AR)
        </button>

        <div class="left-panel-wrapper">
            <div class="product-card">
                <div class="studio-meta" id="studioStatus">// RENDER ACTIVE //</div>
                
                <div class="detail-row">
                    <div class="detail-label">COLLECTION:</div>
                    <div class="detail-value" id="valProduct"></div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">LEATHER/FINISH:</div>
                    <div class="detail-value" id="valFinish"></div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">PRICE:</div>
                    <div class="detail-value price-tag" id="valPrice"></div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">SIZE (UK):</div>
                    <div class="sizes-flex">
                        <div class="size-btn interactive" onclick="setProductSize(this)">8</div>
                        <div class="size-btn interactive" onclick="setProductSize(this)">9</div>
                        <div class="size-btn interactive" onclick="setProductSize(this)">10</div>
                        <div class="size-btn interactive" onclick="setProductSize(this)">11</div>
                    </div>
                </div>
            </div>

            <div class="heritage-badge" id="heritageRibbon">
                Handcrafted Italian Calf Leather
            </div>
        </div>

        <div class="right-bottom-wrapper" id="rightPanel">
            <div class="camera-rotation-pad interactive">
                <div class="pad-title">STUDIO CAMERA</div>
                <div class="pad-row">
                    <div class="rotate-trigger" onclick="orbitStudioModel('left')">⟨</div>
                    <div class="rotate-trigger" onclick="orbitStudioModel('right')">⟩</div>
                </div>
            </div>
            <div class="collection-label">
                AUTUMN / WINTER EDITION
            </div>
        </div>

    </div>

    <script>
        const typographyConfig = [
            { id: 'valProduct', text: 'THE HERITAGE BROGUE' },
            { id: 'valFinish', text: 'Burnished Tan Calfskin' },
            { id: 'valPrice', text: 'Rs. 24,500' }
        ];

        const viewerInstance = document.getElementById('luxuryShoeViewer');

        function orbitStudioModel(direction) {
            viewerInstance.autoRotate = false;
            const currentOrbit = viewerInstance.getCameraOrbit();
            let thetaDegrees = currentOrbit.theta * (180 / Math.PI); 
            
            if (direction === 'left') thetaDegrees -= 40;
            else if (direction === 'right') thetaDegrees += 40;
            
            viewerInstance.cameraOrbit = `${thetaDegrees}deg ${currentOrbit.phi * (180 / Math.PI)}deg auto`;
        }

        function typeWriterEngine(id, text, speed, onComplete) {
            let index = 0;
            const targetElement = document.getElementById(id);
            targetElement.innerHTML = '';
            
            function execute() {
                if (index < text.length) {
                    targetElement.innerHTML += text.charAt(index);
                    index++;
                    setTimeout(execute, speed);
                } else if (onComplete) {
                    onComplete();
                }
            }
            execute();
        }

        function setProductSize(selectedButton) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            selectedButton.classList.add('selected');
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Smoothly remove studio loader text once page structure resolves
            setTimeout(() => {
                const loader = document.getElementById('studioLoader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 600);
                
                // Initialize high-end text sequencing
                startPresentationStream();
            }, 1500);
        });

        function startPresentationStream() {
            typeWriterEngine(typographyConfig[0].id, typographyConfig[0].text, 40, () => {
                typeWriterEngine(typographyConfig[1].id, typographyConfig[1].text, 40, () => {
                    typeWriterEngine(typographyConfig[2].id, typographyConfig[2].text, 40, () => {
                        
                        document.querySelectorAll('.size-btn').forEach((btn, idx) => {
                            setTimeout(() => btn.classList.add('reveal'), idx * 80);
                        });

                        document.getElementById('studioStatus').innerText = '// ENVIRONMENT STABLE //';
                        
                        // Final UI smooth fade-in
                        setTimeout(() => {
                            document.getElementById('heritageRibbon').classList.add('active');
                            document.getElementById('arBtn').style.opacity = '1';
                            document.getElementById('arBtn').style.transform = 'translateY(0)';
                            document.getElementById('rightPanel').style.opacity = '1';
                        }, 800);
                    });
                });
            });
        }

        function triggerAR() {
            const buttonElement = document.getElementById('arBtn');
            const systemArBtn = document.getElementById('hiddenArBtn');
            
            if (systemArBtn) {
                buttonElement.innerText = "OPENING PLACEMENT STREAM...";
                systemArBtn.click();
                setTimeout(() => { buttonElement.innerText = "View In Room (AR)"; }, 4000);
            } else {
                alert("AR core sub-systems failed to respond. Check system layers.");
            }
        }
    </script>
</body>
</html>
